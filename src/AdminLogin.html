<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>노무비 분석 - 관리자</title>
  <?!= include('Stylesheet'); ?>
</head>
<body>
  <div class="login-overlay">
    <div class="login-box">
      <div class="brand" style="margin-bottom: 18px">
        <div class="brand-mark">LC</div>
        <div>
          <div class="brand-title">세방테크 노무비 분석 - 관리자</div>
          <div class="muted" style="font-size: 11px; font-weight: 700">Labor Cost Analysis (Admin)</div>
        </div>
      </div>
      <div class="field">
        <label>관리자 비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호 입력">
      </div>
      <button class="btn primary" style="width: 100%; margin-top: 14px" onclick="submitLogin()">입장</button>
      <div id="msg" class="login-error"></div>
    </div>
  </div>
  <script>
    function submitLogin() {
      var password = document.getElementById('password').value;
      google.script.run
        .withSuccessHandler(function (result) {
          sessionStorage.setItem('sessionToken', result.token);
          sessionStorage.setItem('sessionRole', result.role);
          window.top.location.href = '?page=admin';
        })
        .withFailureHandler(function (err) { document.getElementById('msg').innerText = err.message; })
        .loginAdmin(password);
    }
  </script>
</body>
</html>
