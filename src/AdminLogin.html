<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1e293b; }
    .box { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); width: 320px; }
    h1 { font-size: 18px; margin-bottom: 24px; }
    input { width: 100%; padding: 10px; margin-bottom: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 10px; background: #0f172a; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    #msg { color: #d33; font-size: 13px; margin-top: 8px; min-height: 16px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>어드민 로그인</h1>
    <input id="userId" placeholder="관리자 ID">
    <input id="password" type="password" placeholder="비밀번호">
    <button onclick="submitLogin()">로그인</button>
    <div id="msg"></div>
  </div>
  <script>
    function submitLogin() {
      var userId = document.getElementById('userId').value;
      var password = document.getElementById('password').value;
      google.script.run
        .withSuccessHandler(function () { window.top.location.href = '?page=admin'; })
        .withFailureHandler(function (err) { document.getElementById('msg').innerText = err.message; })
        .loginAdmin(userId, password);
    }
  </script>
</body>
</html>
