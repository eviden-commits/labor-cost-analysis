<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background: #f5f6f8; }
    header { background: #0f172a; color: #fff; padding: 16px 24px; }
    main { padding: 24px; }
    .card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  </style>
</head>
<body>
  <header><h1 style="margin:0;font-size:18px;">노임 추이 (어드민)</h1></header>
  <main>
    <div class="card">
      <h2 style="font-size:15px;">사번별 급여 추적</h2>
      <p>WageRecords 시트 구조 확정 후 구현 예정</p>
    </div>
    <div class="card">
      <h2 style="font-size:15px;">전체 평균 상승률</h2>
      <p>데이터 모델 확정 후 구현 예정</p>
    </div>
    <div class="card">
      <h2 style="font-size:15px;">데이터 전처리 업로드</h2>
      <input type="file" id="file" accept=".xlsx">
      <button id="uploadBtn" onclick="upload()">업로드</button>
      <div id="uploadMsg" style="margin-top:8px;font-size:13px;"></div>
    </div>
    <div class="card">
      <h2 style="font-size:15px;">비밀번호 관리</h2>
      <select id="pwRole" style="width:100%;padding:8px;margin-bottom:8px;">
        <option value="user">사용자(전사 공용) 비밀번호</option>
        <option value="admin">어드민 비밀번호</option>
      </select>
      <input type="password" id="newPassword" placeholder="새 비밀번호" style="width:100%;padding:8px;margin-bottom:8px;box-sizing:border-box;">
      <button id="pwBtn" onclick="changePassword()">변경</button>
      <div id="pwMsg" style="margin-top:8px;font-size:13px;"></div>
    </div>
  </main>
  <script>
    var sessionToken = sessionStorage.getItem('sessionToken');
    if (!sessionToken) {
      window.top.location.href = '?page=admin-login';
    }

    function upload() {
      var input = document.getElementById('file');
      var file = input.files[0];
      var msg = document.getElementById('uploadMsg');
      if (!file) {
        msg.style.color = '#d33';
        msg.innerText = '파일을 선택해주세요.';
        return;
      }
      msg.style.color = '#333';
      msg.innerText = '업로드 중...';
      document.getElementById('uploadBtn').disabled = true;

      var reader = new FileReader();
      reader.onload = function () {
        var base64 = reader.result.split(',')[1];
        google.script.run
          .withSuccessHandler(function (result) {
            msg.style.color = '#080';
            msg.innerText = result.count + '건 처리 완료 (배치 ' + result.batchId + ')';
            document.getElementById('uploadBtn').disabled = false;
          })
          .withFailureHandler(function (err) {
            msg.style.color = '#d33';
            msg.innerText = '오류: ' + err.message;
            document.getElementById('uploadBtn').disabled = false;
          })
          .uploadContractFile(sessionToken, base64, file.name, file.type);
      };
      reader.readAsDataURL(file);
    }

    function changePassword() {
      var role = document.getElementById('pwRole').value;
      var newPassword = document.getElementById('newPassword').value;
      var msg = document.getElementById('pwMsg');
      if (!newPassword) {
        msg.style.color = '#d33';
        msg.innerText = '새 비밀번호를 입력해주세요.';
        return;
      }
      google.script.run
        .withSuccessHandler(function () {
          msg.style.color = '#080';
          msg.innerText = '변경되었습니다.';
          document.getElementById('newPassword').value = '';
        })
        .withFailureHandler(function (err) {
          msg.style.color = '#d33';
          msg.innerText = '오류: ' + err.message;
        })
        .setPassword(role, newPassword, sessionToken);
    }
  </script>
</body>
</html>
