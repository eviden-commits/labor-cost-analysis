<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>노무비 분석</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-mark">LC</div>
      <div>
        <div class="brand-title">노무비 적정성 확인</div>
        <div class="muted" style="font-size: 11px; font-weight: 700">Labor Cost Analysis</div>
      </div>
    </div>
    <div class="top-meta">
      <button class="btn" id="logoutBtn" style="padding: 6px 10px">로그아웃</button>
    </div>
  </header>
  <main>
    <div class="card">
      <h2 class="section-title">입사 대상자 적정성 확인</h2>
      <div class="field">
        <label>생년월일</label>
        <input type="date" id="birthDate">
      </div>
      <div class="base-grid">
        <div class="field">
          <label>노임구분</label>
          <select id="wageType">
            <option value="DAILY">일급</option>
            <option value="MONTHLY">월급</option>
          </select>
        </div>
        <div class="field">
          <label>성별</label>
          <select id="gender">
            <option value="ALL">전체</option>
            <option value="남">남</option>
            <option value="여">여</option>
          </select>
        </div>
        <div class="field">
          <label>연령 비교</label>
          <select id="ageMode">
            <option value="window">±2세 비교</option>
            <option value="exact">동일 나이만</option>
          </select>
        </div>
        <div class="field">
          <label>희망급여 (원)</label>
          <input type="number" id="desiredWage" min="0" placeholder="예: 150000">
        </div>
        <div class="field">
          <label>기준월 (비워두면 최근월)</label>
          <input type="month" id="referenceMonth">
        </div>
      </div>
      <button id="searchBtn" class="btn primary">검색</button>
      <div id="searchError" class="login-error"></div>
    </div>

    <div class="card hidden" id="resultCard">
      <h2 class="section-title" id="resultTitle"></h2>
      <div class="stat-grid stat-grid-5">
        <div class="stat-tile"><span class="stat-label">비교 인원</span><span class="stat-value" id="resultCount"></span></div>
        <div class="stat-tile"><span class="stat-label">최저</span><span class="stat-value" id="resultMin"></span></div>
        <div class="stat-tile"><span class="stat-label">평균</span><span class="stat-value" id="resultMean"></span></div>
        <div class="stat-tile"><span class="stat-label">중위</span><span class="stat-value" id="resultMedian"></span></div>
        <div class="stat-tile"><span class="stat-label">최고</span><span class="stat-value" id="resultMax"></span></div>
      </div>
      <p id="resultVerdict" style="font-weight: 800; margin-bottom: 4px;"></p>
      <p id="resultRank" class="muted" style="margin-top: 0;"></p>
      <div id="lowSampleWarning" class="warning-box hidden">표본이 적어 참고용으로만 활용해주세요.</div>

      <div class="dot-grid">
        <div>
          <h3 class="section-title" style="font-size: 13px;">동일 조건 비교군 분포</h3>
          <canvas id="peerChart" height="140"></canvas>
        </div>
        <div>
          <h3 class="section-title" style="font-size: 13px;">전체(같은 노임구분) 분포</h3>
          <canvas id="companyChart" height="140"></canvas>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./api.js"></script>
  <script src="./user.js"></script>
</body>
</html>
