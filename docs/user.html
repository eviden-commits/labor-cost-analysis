<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>노무비 분석</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-mark">LC</div>
      <div>
        <div class="brand-title">노무비 적정성 확인</div>
        <div class="muted" style="font-size: 11px; font-weight: 700">Labor Cost Analysis</div>
      </div>
    </div>
    <div class="top-meta">
      <button class="btn" id="logoutBtn" style="padding: 6px 10px">로그아웃</button>
    </div>
  </header>
  <main>
    <div class="card">
      <h2 class="section-title">입사 대상자 적정성 확인</h2>
      <div class="field">
        <label>생년월일</label>
        <input type="date" id="birthDate">
      </div>
      <div class="field">
        <label>노임구분</label>
        <select id="wageType">
          <option value="DAILY">일급</option>
          <option value="MONTHLY">월급</option>
        </select>
      </div>
      <div class="field">
        <label>희망급여 (원)</label>
        <input type="number" id="desiredWage" min="0" placeholder="예: 150000">
      </div>
      <button id="searchBtn" class="btn primary">검색</button>
      <div id="searchError" class="login-error"></div>
    </div>

    <div class="card hidden" id="resultCard">
      <h2 class="section-title" id="resultTitle"></h2>
      <div class="summary-line"><span>비교 인원</span><span id="resultCount"></span></div>
      <div class="summary-line"><span>최저 급여</span><span id="resultMin"></span></div>
      <div class="summary-line"><span>중위 급여</span><span id="resultMedian"></span></div>
      <div class="summary-line"><span>최고 급여</span><span id="resultMax"></span></div>
      <div class="summary-line"><span>희망 급여</span><span id="resultDesired"></span></div>
      <p id="resultVerdict" style="font-weight: 800;"></p>
      <canvas id="resultChart" height="120"></canvas>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./api.js"></script>
  <script src="./user.js"></script>
</body>
</html>
